name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Check backend syntax
        run: node --check apps/backend/src/server.js

      - name: Check migration script syntax
        run: node --check apps/backend/scripts/import-legacy-json.js

      - name: Build frontend
        run: npm run build:frontend

