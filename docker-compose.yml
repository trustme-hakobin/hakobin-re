version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: hakobin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hakobin
      POSTGRES_USER: hakobin
      POSTGRES_PASSWORD: hakobin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  pgdata:

